# IG-posztoló — GitHub Actions cron (UTC!). CEST (nyár) = UTC+2:
# 12:00 -> 10:00 UTC, 17:30 -> 15:30, 20:30 -> 18:30. Több tick/idősáv, mert a
# GH-cron késhet; a state.json véd a dupla poszt ellen. TÉLEN (CET=UTC+1) +1 óra eltolás kell!
name: ig-post
on:
  schedule:
    - cron: '0,12,25 10 * * *'
    - cron: '30,42,55 15 * * *'
    - cron: '30,42,55 18 * * *'
  workflow_dispatch:
  push:
    branches: [main]
concurrency:
  group: ig-post
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: cloudflared
        run: |
          curl -sL -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
      - name: post due jobs
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python3 ig_post.py
      - name: commit state
        if: always()
        run: |
          git config user.name "ig-bot"
          git config user.email "ig-bot@users.noreply.github.com"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "state: posted"
            git pull --rebase origin main
            git push origin main
          fi
