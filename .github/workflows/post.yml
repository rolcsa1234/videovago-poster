# IG-posztoló — GitHub Actions cron (UTC!). SŰRŰ POLLING: minden 15. percben egy tág napi
# ablakban, hogy BÁRMILYEN felhasználó-választotta időpontot elkapjon (nem csak a 3 fix sávot),
# Mac nélkül is. A UI 15-perces időpontjaihoz (:00/:15/:30/:45) pontosan illeszkedik.
# A state.json + concurrency véd a dupla poszt ellen. Nem kell DST-igazítás (a tág ablak fedi).
name: ig-post
on:
  schedule:
    # 10–19 UTC = nyáron ~12:00–21:59 CEST, télen ~11:00–20:59 CET (lefedi a napi posztsávokat).
    # Egész napra: '*/15 * * * *' (publikus repónál ingyen; privátnál több Actions-perc).
    - cron: '*/15 10-19 * * *'
  workflow_dispatch:
  push:
    branches: [main]
concurrency:
  group: ig-post
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: cloudflared
        run: |
          curl -sL -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
      - name: post due jobs
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python3 ig_post.py
      - name: commit state
        if: always()
        run: |
          git config user.name "ig-bot"
          git config user.email "ig-bot@users.noreply.github.com"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "state: posted"
            git pull --rebase origin main
            git push origin main
          fi
